<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft | Сайт игр</title>
    <link rel="stylesheet" href="style.css">
</head>

<body dir="ltr">
    <nav class="navbar">
        <ul>
            <li><a href="index.html" id="nav-home">Главная</a></li>
            <li><a href="games.html" id="nav-games">Игры</a></li>
            <li><a href="feedback.html" id="nav-feedback">Обратная связь</a></li>
        </ul>

        <div class="lang-switcher">
            <div class="lang-box">
                <span class="planet-icon">🌐</span>
                <select id="language-select">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="he">עברית</option>
                    <option value="ua">Українська</option>
                </select>
            </div>
        </div>
    </nav>

    <main>
        <div class="card">
            <h2 id="main-title">Minecraft</h2>

            <p id="common-notice" style="margin-top:10px; font-weight:600;"></p>

            <!-- Предупреждение только UA + HE -->
            <p id="translator-note" style="margin-top:8px; color:#facc15;"></p>

            <div id="info-text" style="margin-top:15px;">
                <ul id="info-list"></ul>
            </div>

            <!-- Кнопка TLauncher -->
            <a href="https://tlauncher.org/en/" class="button" id="launcher-link" target="_blank">
                Открыть TLauncher (лаунчер Minecraft)
            </a>

            <br><br>

            <a href="games.html" class="button" id="back-button" style="background:#ccc; color:#000;">
                ⬅ Назад ко всем играм
            </a>
        </div>
    </main>

    <footer>
        Сайт сделал Йося
    </footer>

    <script>
        const translations = {
            ru: {
                title: 'Minecraft',
                commonNotice:
                    'Этот способ позволяет установить Minecraft бесплатно. Через TLauncher (лаунчер Minecraft) можно выбрать язык, включая русский и английский.',
                translatorNote: '',
                launcherLink: 'Открыть TLauncher (лаунчер Minecraft)',
                backButton: '⬅ Назад ко всем играм',
                info: [
                    'TLauncher (лаунчер Minecraft) поддерживает русский и английский.',
                    'После установки можно выбрать любой другой игровой язык.'
                ],
                nav: { home: 'Главная', games: 'Игры', feedback: 'Обратная связь' }
            },

            en: {
                title: 'Minecraft',
                commonNotice:
                    'This method allows you to install Minecraft for free. TLauncher (Minecraft launcher) supports English and Russian.',
                translatorNote: '',
                launcherLink: 'Open TLauncher (Minecraft launcher)',
                backButton: '⬅ Back to all games',
                info: [
                    'TLauncher (Minecraft launcher) supports English and Russian.',
                    'After installation, you will be able to change the game language to any other one.',
                ],
                nav: { home: 'Home', games: 'Games', feedback: 'Feedback' }
            },

            he: {
                title: 'Minecraft',
                commonNotice:
                    'השיטה הזאת מאפשרת להתקין Minecraft בחינם. TLauncher (משגר Minecraft) תומך באנגלית וברוסית.',
                translatorNote:
                    'חשוב: TLauncher (משגר Minecraft) תומך רק באנגלית ורוסית.',
                launcherLink: 'פתח את TLauncher (משגר Minecraft)',
                backButton: '⬅ חזרה לכל המשחקים',
                info: [
                    'TLauncher (משגר Minecraft) תומך באנגלית ורוסית.',
                    'לאחר ההתקנה תוכלו לבחור את שפת המשחק לכל שפה אחרת.',
                ],
                nav: { home: 'ראשי', games: 'משחקים', feedback: 'משוב' }
            },

            ua: {
                title: 'Minecraft',
                commonNotice:
                    'Цей спосіб дозволяє встановити Minecraft безкоштовно. TLauncher (лаунчер Minecraft) підтримує англійську та російську мови.',
                translatorNote:
                    'Важливо: TLauncher (лаунчер Minecraft) працює лише англійською та російською.',
                launcherLink: 'Відкрити TLauncher (лаунчер Minecraft)',
                backButton: '⬅ Назад до всіх ігор',
                info: [
                    'TLauncher (лаунчер Minecraft) підтримує англійську та російську.',
                    'Після встановлення можна змінити мову на будь яку іншу.'
                ],
                nav: { home: 'Головна', games: 'Ігри', feedback: 'Зворотний зв’язок' }
            }
        };

        function applyTranslations(lang) {
            const t = translations[lang];

            document.getElementById('main-title').textContent = t.title;
            document.getElementById('common-notice').textContent = t.commonNotice;

            const translator = document.getElementById('translator-note');
            if (t.translatorNote) {
                translator.textContent = t.translatorNote;
                translator.style.display = 'block';
            } else {
                translator.style.display = 'none';
            }

            const infoList = document.getElementById('info-list');
            infoList.innerHTML = '';
            t.info.forEach(line => {
                const li = document.createElement('li');
                li.textContent = line;
                infoList.appendChild(li);
            });

            document.getElementById('launcher-link').textContent = t.launcherLink;
            document.getElementById('back-button').textContent = t.backButton;

            document.getElementById('nav-home').textContent = t.nav.home;
            document.getElementById('nav-games').textContent = t.nav.games;
            document.getElementById('nav-feedback').textContent = t.nav.feedback;

            if (lang === 'he') {
                document.body.dir = 'rtl';
                document.querySelector('.card').style.textAlign = 'right';
            } else {
                document.body.dir = 'ltr';
                document.querySelector('.card').style.textAlign = 'left';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const lang = localStorage.getItem('siteLang') || 'ru';
            const select = document.getElementById('language-select');
            select.value = lang;

            applyTranslations(lang);

            select.addEventListener('change', () => {
                const newLang = select.value;
                localStorage.setItem('siteLang', newLang);
                applyTranslations(newLang);
            });
        });
    </script>

</body>
</html>
